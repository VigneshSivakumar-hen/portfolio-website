function useInView(ref,th=0.15){
  const [v,setV]=useState(false);
  useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold:th});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return v;
}

function Reveal({children,delay=0,style={}}){
  const ref=useRef(null);
  const v=useInView(ref);
  return(
    <div ref={ref} style={{opacity:v?1:0,transform:v?'none':'translateY(28px)',transition:`opacity .65s ease ${delay}ms, transform .65s ease ${delay}ms`,...style}}>
      {children}
    </div>
  );
}

function ParticleCanvas(){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current; if(!c)return;
    const ctx=c.getContext('2d');
    let id,pts=[];
    const resize=()=>{
      c.width=c.offsetWidth; c.height=c.offsetHeight;
      const n=Math.min(Math.floor((c.width*c.height)/7000),110);
      pts=Array.from({length:n},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.8+0.4,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,a:Math.random()*.5+.15}));
    };
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.hypot(dx,dy);
        if(d<130){ctx.strokeStyle=`rgba(99,102,241,${(1-d/130)*.15})`;ctx.lineWidth=.7;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}
      }
      pts.forEach(p=>{
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(56,189,248,${p.a})`;
        ctx.shadowBlur=6;ctx.shadowColor='rgba(56,189,248,.5)';ctx.fill();ctx.shadowBlur=0;
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
        if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
      });
      id=requestAnimationFrame(draw);
    };
    resize();draw();
    window.addEventListener('resize',resize);
    return()=>{cancelAnimationFrame(id);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}}/>;
}

function Typewriter({words}){
  const [txt,setTxt]=useState('');
  const [wi,setWi]=useState(0);
  const [ci,setCi]=useState(0);
  const [del,setDel]=useState(false);
  useEffect(()=>{
    const w=words[wi];
    const t=setTimeout(()=>{
      if(!del){setTxt(w.slice(0,ci+1));if(ci+1===w.length){setDel(true);return;}setCi(c=>c+1);}
      else{setTxt(w.slice(0,ci-1));if(ci-1===0){setDel(false);setWi(x=>(x+1)%words.length);setCi(0);return;}setCi(c=>c-1);}
    },del?42:88);
    return()=>clearTimeout(t);
  },[txt,wi,ci,del]);
  return(
    <span style={{fontFamily:'JetBrains Mono,monospace',color:'#f59e0b',fontSize:'clamp(.95rem,2.5vw,1.2rem)'}}>
      {txt}<span style={{display:'inline-block',width:2,height:'1em',background:'#f59e0b',marginLeft:2,verticalAlign:'text-bottom',animation:'blink .9s steps(1) infinite'}}/>
    </span>
  );
}

            <div style={{display:'flex',flexWrap:'wrap',gap:9}}>
              {COMPETENCIES.map(t=>(
                <span key={t} style={{background:'rgba(56,189,248,.07)',border:'1px solid rgba(56,189,248,.18)',color:'#7dd3fc',padding:'7px 16px',borderRadius:99,fontSize:'.76rem',fontFamily:'JetBrains Mono,monospace',cursor:'default',transition:'all .2s'}}
                  onMouseEnter={e=>{e.target.style.background='linear-gradient(135deg,#38bdf8,#6366f1)';e.target.style.color='#fff';e.target.style.transform='scale(1.06)';e.target.style.border='1px solid transparent';}}
                  onMouseLeave={e=>{e.target.style.background='rgba(56,189,248,.07)';e.target.style.color='#7dd3fc';e.target.style.transform='';e.target.style.border='1px solid rgba(56,189,248,.18)';}}>
                  {t}
                </span>
              ))}
            </div>
          </Reveal>
        </div>
      </section>

      {/* PROJECTS */}
      <section id="projects" style={{padding:'90px 24px',background:'linear-gradient(135deg,#080f1f,#0a1428)'}}>
        <div style={{maxWidth:1100,margin:'auto'}}>
          <SectionHead label="// what I've built" title="Featured Projects"/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(290px,1fr))',gap:22}}>
            {PROJECTS.map((p,i)=><ProjCard key={p.title} p={p} i={i}/>)}
          </div>
        </div>
      </section>

      {/* CERTIFICATES */}
      <section id="certs" style={{padding:'90px 24px',background:'#060d1a'}}>
        <div style={{maxWidth:1100,margin:'auto'}}>
          <SectionHead label="// credentials" title="Certificates"/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(250px,1fr))',gap:20}}>
            {CERTS.map((c,i)=><CertCard key={c.title} c={c} i={i}/>)}
          </div>
        </div>
      </section>

      {/* CONTACT */}
      <section id="contact" style={{padding:'90px 24px',background:'linear-gradient(135deg,#080f1f,#020617)',textAlign:'center'}}>
        <div style={{maxWidth:620,margin:'auto'}}>
          <Reveal>
            <p style={{fontFamily:'JetBrains Mono,monospace',fontSize:'.7rem',color:'#38bdf8',textTransform:'uppercase',letterSpacing:'.14em',marginBottom:6}}>// get in touch</p>
            <h2 style={{fontSize:'clamp(1.6rem,3.5vw,2.4rem)',fontWeight:800,letterSpacing:'-.02em',marginBottom:12}}>Let's Connect</h2>
            <div style={{width:56,height:4,background:'linear-gradient(90deg,#38bdf8,#6366f1)',borderRadius:4,margin:'0 auto 28px'}}/>
            <p style={{color:'#94a3b8',marginBottom:36,lineHeight:1.82,fontSize:'.95rem'}}>
              Open to Data Science internships and entry-level roles. Whether you have an opportunity or just want to say hi — inbox is open.
            </p>
            <a href="mailto:vigneshsivakumar495@gmail.com" style={{display:'inline-block',fontFamily:'JetBrains Mono,monospace',fontSize:'.9rem',color:'#f59e0b',background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.25)',padding:'12px 24px',borderRadius:10,marginBottom:36,textDecoration:'none'}}
              onMouseEnter={e=>e.target.style.background='rgba(245,158,11,.15)'} onMouseLeave={e=>e.target.style.background='rgba(245,158,11,.08)'}>
              📧 vigneshsivakumar495@gmail.com
            </a>
            <div style={{display:'flex',justifyContent:'center',gap:12,flexWrap:'wrap'}}>
              {[
                {href:'https://www.linkedin.com/in/vignesh-s-04-11-2006-nov',label:'💼 LinkedIn',c:'#38bdf8'},
                {href:'https://github.com/VigneshSivakumar-hen',label:'🐙 GitHub',c:'#a78bfa'},
                {href:'Vignesh_S_Resume.pdf',label:'📄 Resume',c:'#34d399'},
              ].map(s=>(
                <a key={s.label} href={s.href} target="_blank" style={{display:'inline-flex',alignItems:'center',gap:7,padding:'11px 22px',borderRadius:10,border:`1px solid ${s.c}30`,background:`${s.c}0a`,color:s.c,fontWeight:600,fontSize:'.85rem',textDecoration:'none',transition:'transform .2s,border-color .2s'}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-3px)';e.currentTarget.style.borderColor=s.c;}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.borderColor=`${s.c}30`;}}>
                  {s.label}
                </a>
              ))}
            </div>
          </Reveal>
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{background:'linear-gradient(135deg,#010409,#060d1a)',color:'#475569',textAlign:'center',padding:'22px',borderTop:'1px solid rgba(56,189,248,.08)',fontSize:'.8rem'}}>
        © 2026 Vignesh S &nbsp;·&nbsp; AI & Data Science Portfolio &nbsp;·&nbsp;
        <span style={{fontFamily:'JetBrains Mono,monospace',color:'#38bdf8'}}>Built with React ⚛️</span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
